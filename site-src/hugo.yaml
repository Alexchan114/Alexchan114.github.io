baseURL: "https://alexchan114.github.io/"
locale: "zh-cn"
title: "AlexanderChan's Blog"
theme: "hugo-xmin"
enableRobotsTXT: true

permalinks:
  note: "/note/:year/:month/:day/:slug/"
  post: "/post/:year/:month/:day/:slug/"

menu:
  main:
    - name: Home
      url: ""
      weight: 1
    - name: About
      url: "about/"
      weight: 2
    - name: Categories
      url: "categories/"
      weight: 3
    - name: Tags
      url: "tags/"
      weight: 4
    - name: Subscribe
      url: "index.xml"
      weight: 5

params:
  description: "A minimal personal blog by AlexanderChan."
  footer: "&copy; [AlexanderChan](https://github.com/Alexchan114) 2026 -- {Year} | [GitHub](https://github.com/Alexchan114)"

markup:
  highlight:
    codeFences: false
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
  section:
    - HTML
    - RSS
